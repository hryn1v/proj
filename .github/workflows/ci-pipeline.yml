name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for SonarCloud

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/ --output-format=github

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          pytest --junitxml=reports/junit.xml \
                 --cov=src \
                 --cov-report=xml:reports/coverage.xml \
                 --cov-report=html:reports/htmlcov \
                 --cov-report=term-missing \
                 -v

      - name: Verify coverage threshold
        run: |
          coverage report --fail-under=70

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports
          path: |
            reports/junit.xml
            reports/coverage.xml
            reports/htmlcov/
          retention-days: 30

      # SonarCloud analysis runs only when a SONAR_TOKEN secret is configured.
      # Until then the pipeline still passes (lint, tests, coverage, artifacts).
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # Quality Gate runs in the same job so it can read the scanner metadata
      # (.scannerwork/report-task.txt) produced by the scan step above.
      - name: Check SonarCloud Quality Gate
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
